<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>临时停车 请多关照</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background: #1a1c2c; 
            color: #eee; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: #25283d; 
            padding: 30px; 
            border-radius: 20px; 
            width: 85%; 
            max-width: 340px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .icon { font-size: 60px; margin-bottom: 15px; }
        h2 { color: #5dade2; margin-bottom: 5px; }
        p { font-size: 14px; color: #999; margin-bottom: 25px; }
        textarea { 
            width: 100%; 
            height: 100px;
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid #444; 
            background: #1a1c2c; 
            color: white; 
            box-sizing: border-box; 
            font-size: 16px; 
            margin-bottom: 20px;
            outline: none;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 10px; 
            background: #5dade2; 
            color: #1a1c2c; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer;
        }
        button:active { background: #3498db; }
        .tips { font-size: 12px; color: #666; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">📫</div>
    <h2>联系车主</h2>
    <p>临时停放，造成不便请见谅<br>点击下方按钮，车主将收到通知</p>
    
    <textarea id="msg" placeholder="在此输入留言（如：堵住路了）"></textarea>

    <button id="btn" onclick="notify()">立刻通知车主</button>
    
    <div class="tips">信息将通过加密通道发送<br>保护隐私，安全便捷</div>
</div>

<script>
    // ！！！请再次确认这个名字和你在手机 App 订阅的一模一样！！！
    const myTopic = "hyteqpzhamv"; 

    function notify() {
        const msgBox = document.getElementById("msg");
        const sendBtn = document.getElementById("btn");
        const content = msgBox.value.trim() || "有人找您挪车";

        sendBtn.disabled = true;
        sendBtn.innerText = "正在呼叫中...";

        // 使用最简单的 POST 请求
        fetch("https://ntfy.sh/" + myTopic, {
            method: "POST",
            body: "挪车提醒：" + content
        })
        .then(res => {
            if (res.ok) {
                alert("✅ 呼叫成功！请稍等片刻。");
                sendBtn.innerText = "已发送";
                msgBox.value = "";
            } else {
                throw new Error();
            }
        })
        .catch(err => {
            alert("❌ 呼叫失败，请检查手机网络");
            sendBtn.disabled = false;
            sendBtn.innerText = "立刻通知车主";
        });
    }
</script>

</body>
</html>
