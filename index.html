<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>临时停车 敬请见谅</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        :root { 
            --primary: #00d2ff; 
            --bg: #0f172a; 
            --card: #1e293b; 
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: var(--card); 
            padding: 40px 20px; 
            border-radius: 24px; 
            width: 88%; 
            max-width: 360px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            text-align: center; 
        }
        .icon { font-size: 50px; margin-bottom: 20px; }
        h2 { margin: 0 0 10px 0; font-size: 24px; letter-spacing: 1px; }
        p { font-size: 15px; opacity: 0.8; margin-bottom: 30px; line-height: 1.6; }
        textarea { 
            width: 100%; 
            height: 120px;
            padding: 14px; 
            margin-bottom: 25px; 
            border-radius: 12px; 
            border: 2px solid #334155; 
            background: #111b2d; 
            color: white; 
            box-sizing: border-box; 
            font-size: 16px; 
            outline: none; 
            resize: none;
            font-family: inherit;
        }
        textarea:focus { border-color: var(--primary); background: #0f172a; }
        button { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 14px; 
            background: var(--primary); 
            color: #0f172a; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.2s; 
            box-shadow: 0 4px 20px rgba(0, 210, 255, 0.4); 
        }
        button:active { transform: scale(0.97); }
        button:disabled { background: #475569; color: #94a3b8; box-shadow: none; cursor: not-allowed; }
        .footer { font-size: 11px; opacity: 0.5; margin-top: 30px; line-height: 1.6; color: #94a3b8; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">🚗</div>
    <h2>挪车提醒</h2>
    <p>您的不便，深表歉意<br>请输入挪车信息，车主马上赶到</p>
    
    <textarea id="message" placeholder="请输入挪车信息"></textarea>

    <button id="sendBtn" onclick="send()">一键提醒车主</button>
    
    <div class="footer">
        通知将通过加密通道发送至车主<br>
        您的隐私信息受保护，仅用于本次挪车
    </div>
</div>

<script>
    const topic = “hyteqpzhamv"; 

    async function send() {
        const msgInput = document.getElementById("message");
        const btn = document.getElementById("sendBtn");
        const message = msgInput.value.trim();

        if (!message) {
            alert("请输入挪车信息");
            msgInput.focus();
            return;
        }

        btn.disabled = true;
        btn.innerText = "正在呼叫车主...";

        try {
            const response = await fetch(`https://ntfy.sh/${topic}`, {
                method: "POST",
                body: `【挪车提醒】\n内容：${message}`,
                headers: {
                    'Title': '🚗 紧急挪车提醒',
                    'Priority': '5',
                    'Tags': 'warning,car'
                }
            });

            if (response.ok) {
                alert("✅ 通知发送成功！车主已收到提醒。");
                btn.innerText = "已成功通知";
                msgInput.value = "";
            } else {
                throw new Error();
            }
        } catch (e) {
            alert("❌ 发送出错，请检查网络");
            btn.disabled = false;
            btn.innerText = "一键提醒车主";
        }
    }
</script>

</body>
</html>
